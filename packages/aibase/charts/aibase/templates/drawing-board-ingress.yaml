{{- if and .Values.drawingBoard.enabled .Values.drawingBoard.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aibase.fullname" . }}-drawing-board
  labels:
    {{- include "aibase.labels" . | nindent 4 }}
    app.kubernetes.io/component: drawing-board
  {{- with .Values.drawingBoard.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.drawingBoard.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.drawingBoard.ingress.tls }}
  tls:
    {{- range .Values.drawingBoard.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.drawingBoard.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "aibase.fullname" $ }}-drawing-board
                port:
                  number: {{ $.Values.drawingBoard.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
