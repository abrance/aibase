# Root multi-service compose — start everything in one command.
#
#   docker compose up --build
#
# Or just the AI backend:
#
#   docker compose up aibase
#
# Or just the front-end (with an external aibase already running on the
# host network, reachable as `host.docker.internal:3001`):
#
#   AIBASE_BACKEND_URL=http://host.docker.internal:3001 docker compose up drawing-board
#
services:
  aibase:
    build:
      context: ./packages/aibase
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      AIBASE_HOST: "0.0.0.0"
      AIBASE_PORT: "3001"
      AIBASE_CORS_ORIGIN: "${AIBASE_CORS_ORIGIN:-*}"
      AIBASE_WORKSPACE: /workspace
      AIBASE_SKILLS_DIR: /app/skills
      AIBASE_MCP_DIR: /app/mcp
      OPENCODE_BIN: /usr/local/bin/opencode
      OPENCODE_HOST: 127.0.0.1
    env_file:
      - ./packages/aibase/.env
    volumes:
      - ./packages/aibase/skills:/app/skills:ro
      - ./packages/aibase/mcp:/app/mcp:ro

  drawing-board:
    build:
      context: .
      dockerfile: apps/drawing-board/Dockerfile
    ports:
      - "5173:5173"
    environment:
      DRAWING_BOARD_HOST: "0.0.0.0"
      AIBASE_BACKEND_URL: "${AIBASE_BACKEND_URL:-http://aibase:3001}"
    depends_on:
      - aibase