# Deployment values for xiaoy_us (k3s @ 10.193.0.40)
# Usage: helm upgrade --install aibase charts/aibase -n aibase -f charts/aibase/values-us.yaml

# Use locally-built image imported into containerd
image:
  repository: aibase
  tag: us-deploy
  pullPolicy: Never

# Expose via NodePort + Traefik Ingress
service:
  type: NodePort
  port: 3001

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: ai.us.xiaoyxq.top
      paths:
        - path: /
          pathType: Prefix

env:
  AIBASE_HOST: "0.0.0.0"
  AIBASE_PORT: "3001"
  AIBASE_WORKSPACE: /workspace
  AIBASE_SKILLS_DIR: /app/skills
  AIBASE_MCP_DIR: /app/mcp
  AIBASE_MCP_AUTO_REGISTER: "true"
  OPENCODE_BIN: /usr/local/bin/opencode
  OPENCODE_HOST: 127.0.0.1
  OPENCODE_START_TIMEOUT_MS: "60000"
  AIBASE_PROMPT_STREAM_TIMEOUT_MS: "600000"

livenessProbe:
  initialDelaySeconds: 60
readinessProbe:
  initialDelaySeconds: 30

# opencode web UI — exposed at code.us.xiaoyxq.top
opencodeWeb:
  enabled: true

  service:
    type: ClusterIP
    port: 4096

  ingress:
    enabled: true
    className: traefik
    hosts:
      - host: code.us.xiaoyxq.top
        paths:
          - path: /
            pathType: Prefix

  env:
    OMO_DEFAULT_ULTRA_MODEL: "opencode-zen/deepseek-v4-flash-free"
    OMO_DEFAULT_LITE_MODEL: "opencode-zen/deepseek-v4-flash-free"

  livenessProbe:
    initialDelaySeconds: 60
  readinessProbe:
    initialDelaySeconds: 30

drawingBoard:
  enabled: true
  image:
    repository: aibase
    tag: ""
    pullPolicy: Never
  aibaseBackendUrl: "http://aibase:3001"
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    className: traefik
    hosts:
      - host: draw.us.xiaoyxq.top
        paths:
          - path: /
            pathType: Prefix
