name: Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aibase/core check
      - run: pnpm --filter @aibase/core test

  image:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./packages/aibase
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  image-drawing-board:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/drawing-board
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/drawing-board/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  chart:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Package Helm chart
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            helm package packages/aibase/charts/aibase \
              -d packages/aibase/charts/ \
              --version "${VERSION}" \
              --app-version "${VERSION}"
          else
            helm package packages/aibase/charts/aibase -d packages/aibase/charts/
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Push chart to GHCR (OCI)
        run: |
          CHART_TGZ=$(ls -t packages/aibase/charts/aibase-*.tgz | head -1)
          helm push "$CHART_TGZ" "oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/aibase/charts/aibase-*.tgz
          generate_release_notes: true

  deploy:
    needs: [image, image-drawing-board, chart]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.K3S_HOST }}
          username: ${{ secrets.K3S_SSH_USER }}
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            set -e

            IMAGE_TAG="${{ github.ref_name }}"
            # docker/metadata-action 的 semver pattern 会去掉 v 前缀
            IMAGE_TAG="${IMAGE_TAG#v}"

            # K3s 主机上登录 GHCR，以便拉取 OCI chart
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              sudo helm registry login ghcr.io \
                --username "${{ github.actor }}" \
                --password-stdin

            # opencode-web Basic Auth 密码
            OPENCODE_WEB_PASS=$(openssl rand -base64 16)
            sudo KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl create secret generic opencode-web-auth \
              -n aibase \
              --from-literal=OPENCODE_SERVER_PASSWORD="$OPENCODE_WEB_PASS" \
              --dry-run=client -o yaml | \
              sudo KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f -

            # opencode-web 配置（values-us.yaml 不在远程主机上，用 heredoc 写入）
            cat > /tmp/opencode-web-values.yaml << 'EOF'
            opencodeWeb:
              enabled: true
              replicaCount: 1
              containerPort: 4096
              webHost: "0.0.0.0"
              webPort: "4096"
              webCors: "*"
              serverAuth:
                enabled: true
                username: "opencode"
                existingSecret: "opencode-web-auth"
                passwordSecretKey: "OPENCODE_SERVER_PASSWORD"
              service:
                type: ClusterIP
                port: 4096
              ingress:
                enabled: true
                className: traefik
                hosts:
                  - host: code.us.xiaoyxq.top
                    paths:
                      - path: /
                        pathType: Prefix
              env:
                OMO_DEFAULT_ULTRA_MODEL: "customkimi/kimi-for-coding"
                OMO_DEFAULT_LITE_MODEL: "opencode-zen/deepseek-v4-flash-free"
              livenessProbe:
                httpGet:
                  path: /global/health
                  port: http
                initialDelaySeconds: 60
                periodSeconds: 30
                timeoutSeconds: 5
                failureThreshold: 3
              readinessProbe:
                httpGet:
                  path: /global/health
                  port: http
                initialDelaySeconds: 30
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 3
            EOF

            # drawing-board 配置 (use unquoted EOF for IMAGE_TAG expansion)
            cat > /tmp/drawing-board-values.yaml << EOF
            drawingBoard:
              enabled: true
              replicaCount: 1
              containerPort: 5173
              image:
                repository: ghcr.io/${{ github.repository_owner }}/drawing-board
                tag: "${IMAGE_TAG}"
                pullPolicy: IfNotPresent
              aibaseBackendUrl: "http://aibase:3001"
              extraEnv:
                - name: VITE_ALLOWED_HOSTS
                  value: "draw.us.xiaoyxq.top,ai.us.xiaoyxq.top"
              service:
                type: ClusterIP
                port: 80
              ingress:
                enabled: true
                className: traefik
                hosts:
                  - host: draw.us.xiaoyxq.top
                    paths:
                      - path: /
                        pathType: Prefix
            EOF

            sudo KUBECONFIG=/etc/rancher/k3s/k3s.yaml helm upgrade --install aibase \
              oci://ghcr.io/${{ github.repository_owner }}/charts/aibase \
              --namespace aibase \
              --reuse-values \
              -f /tmp/opencode-web-values.yaml \
              -f /tmp/drawing-board-values.yaml \
              --set image.repository="ghcr.io/${{ github.repository_owner }}/aibase" \
              --set image.tag="${IMAGE_TAG}" \
              --set image.pullPolicy=IfNotPresent \
              --set opencodeWeb.serverAuth.password="${OPENCODE_WEB_PASS}" \
              --atomic \
              --timeout 30m \
              --wait
