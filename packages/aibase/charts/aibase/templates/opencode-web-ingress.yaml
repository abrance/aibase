{{- if and .Values.opencodeWeb.enabled .Values.opencodeWeb.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aibase.fullname" . }}-web
  labels:
    {{- include "aibase.labels" . | nindent 4 }}
    app.kubernetes.io/component: opencode-web
  {{- with .Values.opencodeWeb.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.opencodeWeb.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.opencodeWeb.ingress.tls }}
  tls:
    {{- range .Values.opencodeWeb.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.opencodeWeb.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "aibase.fullname" $ }}-web
                port:
                  number: {{ dig "service" "port" 4096 $.Values.opencodeWeb }}
          {{- end }}
    {{- end }}
{{- end }}
