{{- if include "aibase.hasManagedSecret" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aibase.fullname" . }}
  labels:
    {{- include "aibase.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and .Values.opencode.serverAuth.enabled (not .Values.opencode.serverAuth.existingSecret) .Values.opencode.serverAuth.password }}
  OPENCODE_SERVER_PASSWORD: {{ .Values.opencode.serverAuth.password | quote }}
  {{- end }}
  {{- if and .Values.opencodeWeb.serverAuth.enabled (not .Values.opencodeWeb.serverAuth.existingSecret) .Values.opencodeWeb.serverAuth.password }}
  OPENCODE_SERVER_PASSWORD: {{ .Values.opencodeWeb.serverAuth.password | quote }}
  {{- end }}
  {{- if and .Values.opencode.config.content (not .Values.opencode.config.existingSecret) }}
  OPENCODE_CONFIG_CONTENT: |-
    {{- .Values.opencode.config.content | nindent 4 }}
  {{- end }}
  {{- if and .Values.credentials.items (not .Values.credentials.existingSecret) }}
  {{- range $key, $value := .Values.credentials.items }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
