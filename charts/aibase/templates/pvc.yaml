{{- if and .Values.persistence.workspace.enabled (not .Values.persistence.workspace.existingClaim) -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "aibase.fullname" . }}-workspace
  labels:
    {{- include "aibase.labels" . | nindent 4 }}
  {{- with .Values.persistence.workspace.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.workspace.accessModes | nindent 4 }}
  {{- with .Values.persistence.workspace.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.workspace.size | quote }}
{{- end }}
