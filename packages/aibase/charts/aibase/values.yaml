replicaCount: 1

image:
  repository: aibase
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

containerPort: 3001

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: true
  capabilities:
    drop:
      - ALL
    add:
      - SETUID
      - SETGID
  readOnlyRootFilesystem: false
  runAsGroup: 10001
  runAsNonRoot: true
  runAsUser: 10001

service:
  type: ClusterIP
  port: 80
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: aibase.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  AIBASE_HOST: 0.0.0.0
  AIBASE_PORT: "3001"
  AIBASE_WORKSPACE: /workspace
  AIBASE_SKILLS_DIR: /app/skills
  AIBASE_MCP_DIR: /app/mcp
  AIBASE_MCP_AUTO_REGISTER: "true"
  OPENCODE_BIN: opencode
  OPENCODE_HOST: 127.0.0.1
  OPENCODE_START_TIMEOUT_MS: "30000"
  AIBASE_PROMPT_STREAM_TIMEOUT_MS: "600000"

extraEnv: []
extraEnvFrom: []

opencode:
  serverAuth:
    enabled: false
    username: opencode
    existingSecret: ""
    passwordSecretKey: OPENCODE_SERVER_PASSWORD
    password: ""
  config:
    existingSecret: ""
    secretKey: OPENCODE_CONFIG_CONTENT
    content: ""

credentials:
  existingSecret: ""
  items: {}

persistence:
  workspace:
    enabled: false
    existingClaim: ""
    mountPath: /workspace
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    storageClass: ""
    annotations: {}
  opencodeData:
    enabled: false
    existingClaim: ""
    mountPath: /home/aibase/.local/share/opencode
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    storageClass: ""
    annotations: {}
  opencodeConfig:
    enabled: false
    existingClaim: ""
    mountPath: /home/aibase/.config/opencode
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClass: ""
    annotations: {}
  skills:
    enabled: false
    existingClaim: ""
    mountPath: /app/skills
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClass: ""
    annotations: {}
  mcp:
    enabled: false
    existingClaim: ""
    mountPath: /app/mcp
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClass: ""
    annotations: {}

extraVolumes: []
extraVolumeMounts: []

resources: {}

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# drawing-board: Excalidraw-based drawing board with AI sidebar
# ---------------------------------------------------------------------------
drawingBoard:
  enabled: false
  replicaCount: 1

  image:
    repository: drawing-board
    tag: ""
    pullPolicy: IfNotPresent

  containerPort: 5173

  aibaseBackendUrl: "http://aibase:3001"

  podAnnotations: {}
  podLabels: {}

  service:
    type: ClusterIP
    port: 80
    annotations: {}

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: draw.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  extraEnv: []
  resources: {}

  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# ---------------------------------------------------------------------------
# opencode-web: standalone opencode web UI (same image, different command)
# ---------------------------------------------------------------------------
opencodeWeb:
  enabled: false
  replicaCount: 1

  containerPort: 4096

  # Command flags
  webHost: "0.0.0.0"
  webPort: "4096"
  webCors: "*"

  podAnnotations: {}
  podLabels: {}

  service:
    type: ClusterIP
    port: 4096
    annotations: {}

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: code.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  env:
    # OMO model config — override to customise the agent model mapping
    OMO_DEFAULT_ULTRA_MODEL: "customkimi/kimi-for-coding"
    OMO_DEFAULT_LITE_MODEL: "opencode-zen/deepseek-v4-flash-free"

  extraEnv: []
  extraEnvFrom: []

  # opencode web server auth configuration
  serverAuth:
    enabled: false
    username: ""
    existingSecret: ""
    passwordSecretKey: "OPENCODE_SERVER_PASSWORD"
    password: ""

  resources: {}

  livenessProbe:
    httpGet:
      path: /global/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /global/health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
